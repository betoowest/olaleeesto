<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    background:url("fondo.jpg") no-repeat center center;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

#boton{
    background:none;
    border:none;
    cursor:pointer;
    transition:.2s;
}

#boton img{
    width:220px;
}

#boton:hover{
    transform:scale(1.08);
}

#mensaje{
    position:fixed;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.75);
    color:white;
    padding:15px 30px;
    border-radius:12px;
    font-size:28px;
    display:none;
}
</style>

</head>
<body>

<div id="mensaje">Tonta jejeejee 😂</div>

<button id="boton">
    <img src="boton.png" alt="Botón">
</button>

<script>
const boton = document.getElementById("boton");
const mensaje = document.getElementById("mensaje");

boton.addEventListener("click", () => {
    mensaje.style.display = "block";

    setTimeout(() => {
        mensaje.style.display = "none";
    }, 2000);
});
</script>

</body>
</html>
